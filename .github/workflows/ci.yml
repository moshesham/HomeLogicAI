name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests with coverage gate
        run: pytest --cov=. --cov-report=term --cov-fail-under=70

  scraper-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browser
        run: |
          # Install libasound2t64 (Ubuntu 24.04 renamed libasound2)
          sudo apt-get install -y libasound2t64 2>/dev/null || true
          python -m playwright install chromium --with-deps 2>/dev/null || \
            python -m playwright install chromium
      - name: Run tests
        run: pytest

  frontend-tests:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package-lock.json') != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build
